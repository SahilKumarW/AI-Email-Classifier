<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        
        .input-section {
            padding: 30px;
            background: #f8f9fa;
        }
        
        .output-section {
            padding: 30px;
            background: white;
            border-left: 1px solid #e0e0e0;
        }
        
        .section-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result-box {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;
        }
        
        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .confidence-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: width 0.5s ease;
        }
        
        .auto-reply {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .auto-reply h4 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        
        .auto-reply p {
            color: #555;
            line-height: 1.5;
        }
        
        .emergency {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        
        .emergency h4 {
            color: #c62828;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .badge-auto {
            background: #4caf50;
            color: white;
        }
        
        .badge-human {
            background: #ff9800;
            color: white;
        }
        
        .badge-urgent {
            background: #f44336;
            color: white;
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            background: #e0e0e0;
            color: #555;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .main-card {
                grid-template-columns: 1fr;
            }
            .output-section {
                border-left: none;
                border-top: 1px solid #e0e0e0;
            }
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Email Classifier</h1>
            <p>Intelligent email routing for IT & Customer Support | Ogi Internship Demo</p>
        </div>
        
        <div class="main-card">
            <div class="input-section">
                <h2 class="section-title">Email Input</h2>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="e.g., Refund Request">
                </div>
                <div class="form-group">
                    <label>Body</label>
                    <textarea id="body" placeholder="Describe the issue in detail..."></textarea>
                </div>
                <button onclick="classifyEmail()">Classify Email</button>
                
                <div class="example-buttons">
                    <button class="example-btn" onclick="loadExample('refund')">Refund Example</button>
                    <button class="example-btn" onclick="loadExample('lecture')">Lecture Example</button>
                    <button class="example-btn" onclick="loadExample('emergency')">Emergency Example</button>
                    <button class="example-btn" onclick="loadExample('hardware')">Hardware Example</button>
                </div>
            </div>
            
            <div class="output-section">
                <h2 class="section-title">Classification Result</h2>
                <div id="result">
                    <div style="text-align: center; color: #999; padding: 40px;">
                        Enter an email and click "Classify Email"
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>AI-powered email classification | Auto-reply for high-confidence emails | Human review for sensitive content</p>
        </div>
    </div>
    
    <script>
        async function classifyEmail() {
            const subject = document.getElementById('subject').value;
            const body = document.getElementById('body').value;
            
            if (!subject && !body) {
                alert('Please enter an email subject or body');
                return;
            }
            
            // Show loading
            document.getElementById('result').innerHTML = '<div class="loading">Analyzing email with AI...</div>';
            
            try {
                const response = await fetch('/classify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ subject: subject, body: body })
                });
                
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                document.getElementById('result').innerHTML = '<div style="color: red;">Error: Could not classify. Make sure the server is running.</div>';
            }
        }
        
        function displayResult(result) {
            const isEmergency = result.category === 'EMERGENCY';
            const isAuto = result.action.includes('Auto-Reply');
            
            let html = `
                <div class="result-box">
                    <div class="result-label">CATEGORY</div>
                    <div class="result-value">${result.category}</div>
                </div>
                
                <div class="result-box">
                    <div class="result-label">CONFIDENCE</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${result.confidence}%">${result.confidence}%</div>
                    </div>
                </div>
                
                <div class="result-box">
                    <div class="result-label">ACTION</div>
                    <div class="result-value">
                        ${result.action}
                        <span class="badge ${isAuto ? 'badge-auto' : (isEmergency ? 'badge-urgent' : 'badge-human')}">
                            ${isAuto ? 'AUTO' : (isEmergency ? 'URGENT' : 'REVIEW')}
                        </span>
                    </div>
                </div>
            `;
            
            if (result.auto_reply) {
                html += `
                    <div class="auto-reply">
                        <h4>📨 Auto-Reply Template</h4>
                        <p>${result.auto_reply}</p>
                    </div>
                `;
            } else if (isEmergency) {
                html += `
                    <div class="auto-reply emergency">
                        <h4>⚠️ URGENT - HUMAN REVIEW REQUIRED</h4>
                        <p>This email contains emergency/urgent keywords. Routing to human immediately.</p>
                    </div>
                `;
            } else if (result.action.includes('Human Review')) {
                html += `
                    <div class="auto-reply" style="background: #fff3e0; border-left-color: #ff9800;">
                        <h4>👤 Human Review Recommended</h4>
                        <p>Confidence is below threshold. This email should be reviewed by a human before action.</p>
                    </div>
                `;
            }
            
            document.getElementById('result').innerHTML = html;
        }
        
        function loadExample(type) {
            const examples = {
                refund: {
                    subject: 'Refund Request',
                    body: 'I subscribed to a Pay-as-you-go one month plan for TechHouse sim card, but I have been charged for the second month also. My order ID is TH-19741408'
                },
                lecture: {
                    subject: 'Lecture Cancellation',
                    body: 'Today\'s Machine Learning lecture has been cancelled due to staff illness. The slides have been made available on Learning Central.'
                },
                emergency: {
                    subject: 'Emergency Aid',
                    body: 'I am reaching out via satellites from Iran. We are under attack again by the United States. PLEASE HELP!!!'
                },
                hardware: {
                    subject: 'Laptop Not Working',
                    body: 'My laptop screen is cracked and the keyboard is not responding. I need a replacement urgently.'
                }
            };
            
            const example = examples[type];
            if (example) {
                document.getElementById('subject').value = example.subject;
                document.getElementById('body').value = example.body;
                classifyEmail();
            }
        }
    </script>
</body>
</html>
